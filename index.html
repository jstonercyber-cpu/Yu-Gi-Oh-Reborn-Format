<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yu-Gi-Oh Cube Library</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Yu-Gi-Oh Cube Library</h1>
    <p>Browse the Reborn Format card pool.</p>
  </header>

  <main>
    <section class="controls">
      <input type="text" placeholder="Search cards..." />
      <select>
        <option>All Cards</option>
        <option>Monsters</option>
        <option>Spells</option>
        <option>Traps</option>
      </select>
    </section>

    <section class="card-grid">
      <div class="card">
        <img src="images/example-card.jpg" alt="Example Card" />
        <h2>Example Card</h2>
        <p>Monster</p>
      </div>
    </section>
  </main>
</body>
</html>
