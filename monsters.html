<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yu-Gi-Oh Reborn Format</title>
  <link rel="stylesheet" href="style.css?v=5" />
</head>
<body>
  <div id="background-rotator"></div>
  <header>
    <h1>Yu-Gi-Oh Reborn Format Cube Library</h1>
    <p>Search the Reborn Format Cube card pool.</p>
  </header>
<nav class="main-nav">
  <a href="#" class="nav-tab active-tab" data-category="Home">Home</a>
  <a href="#" class="nav-tab" data-category="Monster">Monsters</a>
  <a href="#" class="nav-tab" data-category="Spell">Spells</a>
  <a href="#" class="nav-tab" data-category="Trap">Traps</a>
  <a href="#">Rules</a>
  <a href="#">Draft</a>
  <a href="https://discord.gg/yAHuqNZZZV" class="discord-link" target="_blank">Discord</a>
</nav>
  <main>
  <section class="search-panel">
    <div class="search-row">
      <input id="searchBox" type="text" placeholder="Search cards..." />
      <button id="searchButton">Search</button>
    </div>

    <div class="filter-row">
      <select id="sortSelect">
        <option value="name">Alphabetical</option>
        <option value="atk">Attack</option>
        <option value="def">Defense</option>
        <option value="attribute">Attribute</option>
        <option value="race">Race</option>
        <option value="monsterType">Monster Type</option>
        <option value="level">Level</option>
      </select>

      <select id="directionSelect">
        <option value="asc">Ascending</option>
        <option value="desc">Descending</option>
      </select>

      <select id="attributeFilter">
        <option value="">All Attributes</option>
      </select>

      <select id="monsterTypeFilter">
        <option value="">Normal & Effect</option>
        <option value="Normal">Normal</option>
        <option value="Effect">Effect</option>
      </select>

      <select id="raceFilter">
        <option value="">All Races</option>
      </select>

      <select id="levelFilter">
        <option value="">All Levels</option>
      </select>

      <button id="clearButton">Clear</button>
    </div>
  </section>

  <section id="cardGrid" class="card-grid"></section>
</main>

  <script src="script.js?v=5"></script>
</body>
</html>
